<div class="submit-form-container">
  <div class="form-row">
    <mat-form-field class="form-field">
      <mat-label>Common Data Models</mat-label>
      <mat-select [value]="selectedCdm()" (selectionChange)="cdmChange.emit($event.value)">
        @for (name of cdmNames(); track name) {
          <mat-option [value]="name">{{ name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field class="form-field">
      <mat-label>Version</mat-label>
      <mat-select
        [value]="selectedVersion()"
        (selectionChange)="versionChange.emit($event.value)"
        [disabled]="!selectedCdm()"
      >
        @for (version of availableVersions(); track version) {
          <mat-option [value]="version">{{ version }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

  <button mat-raised-button color="primary" class="submit-btn" (click)="submitClicked.emit()">
    Submit
  </button>
</div>
