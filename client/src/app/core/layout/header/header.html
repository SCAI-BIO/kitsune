<header class="banner">
  <div class="brand-group">
    <a [routerLink]="['/']" class="logo-link">
      <img src="logo_white.svg" alt="Kitsune Logo" class="logo" />
    </a>
    <h1 class="site-title">Kitsune</h1>
  </div>

  <div class="routing-menu-box">
    <button mat-button [matMenuTriggerFor]="harmonizeMenu" class="nav-button">
      Harmonize <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
    </button>

    <button mat-button [matMenuTriggerFor]="coreModelMenu" class="nav-button">
      Common Data Models <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
    </button>

    <button mat-button [routerLink]="'/t-sne'" class="nav-button">Visualize Embeddings</button>

    <mat-menu #harmonizeMenu="matMenu">
      <button mat-menu-item [routerLink]="'/query'">
        <mat-icon>search</mat-icon>
        <span>Search by Query</span>
      </button>
      <button mat-menu-item [routerLink]="'/harmonize'">
        <mat-icon>upload_file</mat-icon>
        <span>Upload a Dictionary</span>
      </button>
    </mat-menu>

    <mat-menu #coreModelMenu="matMenu">
      <button mat-menu-item [routerLink]="'/core-model'">
        <mat-icon>table_view</mat-icon>
        <span>Table View</span>
      </button>
      <button mat-menu-item [routerLink]="'/core-model-chord-diagram'">
        <mat-icon>donut_large</mat-icon>
        <span>Chord Diagram View</span>
      </button>
    </mat-menu>
  </div>

  <div class="github-logo-box">
    <a
      href="https://github.com/SCAI-BIO/kitsune"
      target="_blank"
      aria-label="Kitsune GitHub Repository"
    >
      <img src="github-mark-white.svg" alt="" class="github-logo" />
    </a>
  </div>
</header>
